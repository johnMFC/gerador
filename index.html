<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Password Generato</title>
</head>
<body>
  <div id="container">
    <h1 id="title">Gerar senha</h1>
  <div id="password_container">
    <span id="password"></span>
    <button id="copy"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-copy" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/></svg>
    </button>
  </div>
  

  <div id="password_items">
    <div class="item">
      <input type="number" name="size" id="number">
      <label for="size">Quantidade de caracteres</label>
    </div>
    <div class="item">
      <input type="checkbox" name="include_uppercase" id="include_uppercase">
      <label for="include_uppercase">
        Incluir letra maiúscula
      </label>
    </div>
    <div class="item">
      <input type="checkbox" name="include_lowercase" id="include_lowercase">
      <label for="include_lowercase">
        Incluir letra minúscula
      </label>
     </div>
     <div class="item">
        <input type="checkbox" name="include_number" id="include_number">
        <label for="include_number">
          Incluir número
        </label>
     </div>
     <div class="item">
        <input type="checkbox" name="include_special_charactere" id="include_special_charactere">
        <label for="include_special_charactere">Incluir caractere especial </label>
     </div>
     <button id="generate">Gerar senha</button>
    </div>
  
</body>
</html>
